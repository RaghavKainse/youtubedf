<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Real Interview Experience</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        mono: ['JetBrains Mono', 'monospace'],
                    },
                    colors: {
                        studio: {
                            bg: '#f8fafc',
                            panel: 'rgba(255, 255, 255, 0.8)',
                            card: 'rgba(255, 255, 255, 0.95)',
                            border: 'rgba(148, 163, 184, 0.1)'
                        },
                        brand: {
                            primary: '#6366f1',
                            accent: '#38bdf8',
                            success: '#10b981'
                        }
                    },
                    animation: {
                        'fade-in': 'fadeIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards',
                        'slide-up': 'slideUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards',
                        'glow-pulse': 'glowPulse 3s infinite alternate',
                        'float': 'float 8s ease-in-out infinite',
                        'bounce-in': 'bounceIn 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) forwards',
                        'reveal-up': 'revealUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards'
                    },
                    keyframes: {
                        fadeIn: { '0%': { opacity: '0' }, '100%': { opacity: '1' } },
                        slideUp: { '0%': { opacity: '0', transform: 'translateY(15px)' }, '100%': { opacity: '1', transform: 'translateY(0)' } },
                        glowPulse: { '0%': { opacity: '0.3', transform: 'scale(1)' }, '100%': { opacity: '0.6', transform: 'scale(1.05)' } },
                        float: { '0%, 100%': { transform: 'translateY(0px)' }, '50%': { transform: 'translateY(-20px)' } },
                        bounceIn: { '0%': { opacity: '0', transform: 'scale(0.3)' }, '100%': { opacity: '1', transform: 'scale(1)' } },
                        revealUp: { '0%': { opacity: '0', transform: 'translateY(40px)' }, '100%': { opacity: '1', transform: 'translateY(0)' } }
                    }
                }
            }
        }
    </script>

    <style>
        /* Comfort Scrollbar */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(148, 163, 184, 0.2); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(99, 102, 241, 0.2); }

        /* Code Highlighting (Muted Professional Style) */
        .code-keyword { color: #6366f1; font-weight: 700; }
        .code-function { color: #0d9488; font-weight: 500; }
        .code-string { color: #0891b2; }
        .code-number { color: #8b5cf6; }
        .code-comment { color: #94a3b8; font-style: italic; }
        .code-operator { color: #334155; }
        .code-class { color: #7c3aed; }

        /* Nordic Glass UI */
        .glass-box {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border: 1px solid rgba(255, 255, 255, 1);
            box-shadow: 
                0 4px 6px -1px rgba(0, 0, 0, 0.02), 
                0 10px 15px -3px rgba(0, 0, 0, 0.03),
                0 20px 25px -5px rgba(0, 0, 0, 0.04);
        }

        /* Question Typography Focus */
        .question-glow {
            text-shadow: 0 0 40px rgba(99, 102, 241, 0.05);
        }

        /* Winner Overlay Effects (Softened) */
        .winner-backdrop {
            background: radial-gradient(circle at center, rgba(255, 255, 255, 0.98) 0%, #f1f5f9 100%);
        }
        .text-glow-fx {
            text-shadow: 0 0 30px var(--glow-color), 0 0 60px var(--glow-color);
        }
        .particle {
            position: absolute; width: 6px; height: 12px; background: #fff;
            animation: fall linear forwards; border-radius: 2px;
        }
        @keyframes fall { to { transform: translateY(100vh) rotate(720deg); } }
    </style>
</head>
<body class="bg-studio-bg text-slate-700 min-h-screen selection:bg-brand-primary/10 selection:text-brand-primary font-sans overflow-hidden">

    <!-- Ambient Nordic Mesh -->
    <div class="fixed inset-0 z-0 pointer-events-none overflow-hidden bg-[#f8fafc]">
        <div class="absolute top-[-20%] left-[-10%] w-[80vw] h-[80vw] rounded-full bg-indigo-50/50 blur-[120px] animate-glow-pulse"></div>
        <div class="absolute bottom-[-10%] right-[-10%] w-[60vw] h-[60vw] rounded-full bg-sky-50/50 blur-[120px] animate-glow-pulse" style="animation-delay: -3.5s;"></div>
    </div>

    <!-- Main App Container -->
    <div class="relative z-10 flex flex-col h-screen max-w-6xl mx-auto px-4 py-4 gap-4">
        
        <!-- Studio Luxe Header -->
        <!-- Soft Nordic Header -->
        <header class="flex items-center justify-between flex-none pb-2 border-b border-slate-200">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 rounded-2xl bg-white border border-slate-200 flex items-center justify-center shadow-sm">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-indigo-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 10l4.553-2.276A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z" />
                    </svg>
                </div>
                <div>
                    <h1 class="text-lg md:text-xl font-bold tracking-tight text-slate-700 flex items-center gap-2">
                        Real Interview <span class="bg-gradient-to-r from-indigo-500 to-sky-500 bg-clip-text text-transparent font-black tracking-tighter">Experience</span>
                    </h1>
                </div>
            </div>

            <!-- Action Buttons -->
            <div class="flex items-center gap-3">
                <div class="hidden sm:flex items-center bg-slate-100 rounded-xl p-0.5 gap-0.5 border border-slate-200">
                    <button onclick="triggerWinner(1)" class="px-3 py-1.5 rounded-lg text-[9px] font-bold text-slate-500 hover:bg-white hover:text-brand-primary hover:shadow-sm transition-all uppercase tracking-tighter">Rank 1</button>
                    <button onclick="triggerWinner(2)" class="px-3 py-1.5 rounded-lg text-[9px] font-bold text-slate-500 hover:bg-white hover:text-brand-primary hover:shadow-sm transition-all uppercase tracking-tighter">Rank 2</button>
                    <button onclick="triggerWinner(3)" class="px-3 py-1.5 rounded-lg text-[9px] font-bold text-slate-500 hover:bg-white hover:text-brand-primary hover:shadow-sm transition-all uppercase tracking-tighter">Rank 3</button>
                </div>
                
                <button onclick="resetCanvas()" class="text-[10px] font-bold text-slate-400 hover:bg-white hover:text-slate-800 bg-slate-100 px-4 py-2 rounded-xl transition-all flex items-center gap-2 border border-slate-200 shadow-sm">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-3.5 w-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
                    </svg>
                    Refresh
                </button>
            </div>
        </header>

        <!-- Nordic Input Bar -->
        <div class="flex-none z-20">
            <div class="glass-box rounded-2xl p-1.5 transition-all duration-700">
                <div class="bg-indigo-50/20 rounded-[14px] px-5 flex items-center gap-4 h-12 border border-slate-200/50">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-indigo-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                    </svg>
                    <input 
                        type="text"
                        id="inputArea" 
                        autocomplete="off"
                        class="w-full bg-transparent border-none outline-none text-slate-700 placeholder-slate-300 font-medium text-base h-full"
                        placeholder="Type to share your experience..."
                    />
                    <div id="statusDot" class="w-2 h-2 rounded-full bg-slate-200 transition-all duration-500"></div>
                </div>
            </div>
        </div>

        <!-- Immersive Viewport -->
        <div class="flex-1 min-h-0 relative rounded-[28px] overflow-hidden glass-box border border-white flex flex-col shadow-2xl">
            <!-- Slim Window Controls -->
            <div class="h-8 bg-white/40 border-b border-black/5 flex items-center px-4 gap-2 flex-none justify-between">
                <div class="flex items-center gap-1.5">
                    <div class="w-2.5 h-2.5 rounded-full bg-slate-200"></div>
                    <div class="w-2.5 h-2.5 rounded-full bg-slate-200"></div>
                    <div class="w-2.5 h-2.5 rounded-full bg-slate-200"></div>
                </div>
                <span class="text-[8px] font-black text-slate-300 uppercase tracking-[0.2em]">Session Viewport</span>
            </div>

            <!-- Optimized Render Area -->
            <div id="renderArea" class="flex-1 overflow-y-auto p-6 md:p-8 flex flex-col gap-5 scroll-smooth bg-white/5">
                <!-- Placeholder State -->
                <div class="flex-1 flex flex-col items-center justify-center text-slate-400 gap-4">
                    <div class="w-16 h-16 rounded-3xl bg-slate-100 flex items-center justify-center opacity-50 mb-2">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10" />
                        </svg>
                    </div>
                    <p class="font-bold text-xs uppercase tracking-widest">Awaiting Content</p>
                </div>
            </div>
        </div>
    </div>

    <!-- Winner Celebration Overlay (Premium Reveal) -->
    <div id="winnerOverlay" class="fixed inset-0 z-50 hidden flex flex-col items-center justify-center winner-backdrop text-slate-800 overflow-hidden backdrop-blur-3xl transition-all duration-700">
        <!-- Floating Depth Elements -->
        <div class="absolute top-[10%] left-[15%] w-64 h-64 rounded-full bg-indigo-200/20 blur-[100px] animate-float"></div>
        <div class="absolute bottom-[10%] right-[15%] w-72 h-72 rounded-full bg-sky-200/20 blur-[110px] animate-float" style="animation-delay: -3s;"></div>
        <div id="confettiContainer" class="absolute inset-0 pointer-events-none"></div>

        <div class="relative z-10 text-center" id="winnerTextContainer">
            <div class="overflow-hidden mb-4">
                <span id="winnerBadge"></span>
            </div>
            
            <h2 id="winnerRank" class="text-8xl md:text-9xl font-bold mb-4 tracking-tighter opacity-0 scale-50 transition-all duration-500">1ST</h2>
            
            <div id="winnerDivider" class="h-1 w-0 mx-auto bg-slate-200 rounded-full mb-8 transition-all duration-700 ease-out"></div>
            
            <div class="overflow-hidden">
                <h3 id="winnerSubtext" class="text-4xl md:text-6xl font-black uppercase tracking-[0.2em] text-glow-fx opacity-0 translate-y-12 transition-all duration-700 text-slate-800" style="--glow-color: transparent;">Winner</h3>
            </div>
        </div>
    </div>

    <script>
        const inputArea = document.getElementById('inputArea');
        const renderArea = document.getElementById('renderArea');
        const statusDot = document.getElementById('statusDot');
        let pastedContent = ""; 

        // Focus management
        inputArea.focus();
        document.addEventListener('click', () => { if(document.activeElement !== inputArea) inputArea.focus(); });

        // Event: FLAWLESS PASTE
        inputArea.addEventListener('paste', (e) => {
            e.preventDefault();
            const text = (e.clipboardData || window.clipboardData).getData('text');
            if (text.trim()) {
                pastedContent = text;
                renderContent(text);
                inputArea.value = '';
                inputArea.placeholder = "";
                statusDot.className = "w-2.5 h-2.5 rounded-full bg-brand-primary shadow-[0_0_10px_rgba(79,70,229,0.3)]";
                setTimeout(() => statusDot.className = "w-2.5 h-2.5 rounded-full bg-indigo-200", 2000);
            }
        });

        // Event: SMART TYPING (For Winner Shortcuts)
        inputArea.addEventListener('input', (e) => {
            const val = e.target.value.trim();
            if (val.startsWith('#')) {
                statusDot.className = "w-2.5 h-2.5 rounded-full bg-brand-accent shadow-[0_0_10px_rgba(244,63,94,0.3)]";
            } else {
                statusDot.className = "w-2.5 h-2.5 rounded-full bg-indigo-200";
            }
        });

        // Event: TRIGGER SHORTCUTS ON ENTER
        inputArea.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                const val = inputArea.value.trim();
                
                if (val.startsWith('#')) {
                    e.preventDefault();
                    let rank = 1, name = '';
                    
                    if (val.startsWith('###')) { rank = 3; name = val.substring(3).trim(); }
                    else if (val.startsWith('##')) { rank = 2; name = val.substring(2).trim(); }
                    else if (val.startsWith('#')) { rank = 1; name = val.substring(1).trim(); }
                    
                    triggerWinner(rank, name);
                    inputArea.value = ''; 
                    statusDot.className = "w-2.5 h-2.5 rounded-full bg-gray-600";
                }
                else if (val.length > 0) {
                    renderContent(val);
                    inputArea.value = '';
                }
            }
        });

        // Reset the screen
        function resetCanvas() {
            pastedContent = "";
            renderArea.innerHTML = `
                <div class="flex-1 flex flex-col items-center justify-center text-slate-400 gap-4 animate-fade-in">
                    <div class="w-16 h-16 rounded-3xl bg-slate-100 flex items-center justify-center opacity-50 mb-2">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10" />
                        </svg>
                    </div>
                    <p class="font-bold text-xs uppercase tracking-widest">Screen Reset</p>
                </div>`;
            inputArea.value = '';
            inputArea.placeholder = "";
            inputArea.focus();
        }

        // ==========================================
        // SMART PARSER: Core Logic Engine
        // ==========================================
        function renderContent(text) {
            if (!text.trim()) return;

            // 1. RAW CODE DETECTION
            const isCodeLikely = (str) => {
                if (str.includes('```')) return false; 
                const lines = str.split('\n');
                let codeHints = 0, textHints = 0;

                const codePatterns = [
                    /function\s*\w*\s*\(/, /const\s+\w+\s*=/, /let\s+\w+\s*=/, /var\s+\w+\s*=/,
                    /import\s+.*from/, /import\s+\w+/, /export\s+default/, /class\s+\w+/, /public\s+class/,
                    /def\s+\w+\s*\(/, /if\s*\(/, /for\s*\(/, /while\s*\(/, /return\s+/,
                    /console\./, /System\.out/, /print\s*\(/, /#include/, /<[a-zA-Z]+>/i,
                    /=>/, /===/, /!==/, /==/, /\+=/, /\-=/, 
                    /^\s*SELECT\b/i, /^\s*FROM\b/i, /^\s*WHERE\b/i, /^\s*UPDATE\b/i, /^\s*INSERT\b/i, /^\s*DELETE\b/i,
                    /for\s+\w+\s+in\s+/, /if\s+.+:/, /elif\s+.+:/, /else:/
                ];

                lines.forEach(l => {
                    let line = l.trim();
                    if(!line) return;
                    if (codePatterns.some(regex => regex.test(line)) || line.endsWith(';') || line.endsWith('{') || line === '}' || /^[\s]*[\]\}][\s,;]*$/.test(line) || line.includes(' = ') || /^[\w\.]+\s*\(.*\)/.test(line)) {
                        codeHints++;
                    } else if (/^[A-Z][a-z]+/.test(line) && /[.?!]$/.test(line)) {
                        textHints++;
                    }
                });
                return codeHints > 0 && codeHints >= textHints;
            };

            if (isCodeLikely(text)) {
                text = "```\n" + text + "\n```";
            }

            let html = '';
            
            // 2. EXTRACT CODE BLOCKS
            const codeBlocks = [];
            let processedText = text.replace(/```(\w*)\n([\s\S]*?)```/g, (match, lang, code) => {
                codeBlocks.push({ lang: lang.trim(), code: code.trim() });
                return `\n__CODE_BLOCK_${codeBlocks.length - 1}__\n`;
            });
            processedText = processedText.replace(/```([\s\S]*?)```/g, (match, code) => {
                codeBlocks.push({ lang: '', code: code.trim() });
                return `\n__CODE_BLOCK_${codeBlocks.length - 1}__\n`;
            });

            // 3. PARSE MULTILINE QUESTION (H1/H2)
            const lines = processedText.split('\n');
            let isExtractingQuestion = true;
            let questionLines = [];

            const isLooksLikeCode = (str) => {
                return /^[a-z_][a-zA-Z0-9_]*\s*=/.test(str) || /[{}\[\]]/.test(str) || /^(const|let|var|function|def|class|import|#include)/.test(str) || /==|!=|=>|\+=|\-=/.test(str) || /console\.|System\.|print\(/.test(str) || /;\s*$/.test(str) || /^\s*(SELECT|UPDATE|INSERT|DELETE|FROM|WHERE)\b/i.test(str); 
            };

            // Options Regex: Jaise A), 1., (A)
            const isOptionRegex = /^(\(?[a-zA-Z][\).]|[0-9]+[\).]|[-*])\s+(.*)/;

            for (let i = 0; i < lines.length; i++) {
                let line = lines[i].trim();

                // MULTILINE QUESTION LOGIC
                if (isExtractingQuestion) {
                    // Agar sabse upar khali jagah ho toh usko ignore karo
                    if (!line && questionLines.length === 0) continue;

                    // Agar question text chalu hone ke baad khali jagah aaye -> Question End
                    if (!line) {
                        isExtractingQuestion = false;
                        let combinedQ = questionLines.join('<br>');
                        html += `<h1 class="text-2xl md:text-3xl font-extrabold text-slate-800 leading-tight animate-slide-up tracking-tight mb-4">${combinedQ}</h1>`;
                        continue;
                    }

                    let isFirstContentLine = questionLines.length === 0;

                    // Conditions jo Question Extraction ko rokengi
                    if (line.includes('__CODE_BLOCK_') || 
                        isLooksLikeCode(line) || 
                        (!isFirstContentLine && isOptionRegex.test(line)) || // Pehli line 1. ho sakti hai, par agli line pe option mile toh H1 ban jaye
                        line.match(/^(Interviewer|Candidate|HR|You|Me):/i) || 
                        line.match(/^##/) || 
                        line.match(/^>/)) 
                    {
                        isExtractingQuestion = false;
                        
                        if (questionLines.length > 0) {
                            let combinedQ = questionLines.join('<br>');
                            html += `<h1 class="text-3xl md:text-4xl lg:text-5xl font-bold text-slate-700 leading-[1.15] animate-slide-up tracking-tighter mb-6">${combinedQ}</h1>`;
                        }
                        // Continue mat likhna, taaki ye line normal process ho jaye!
                    } else {
                        // Formatting
                        let formattedLine = line
                            .replace(/\*\*(.*?)\*\*/g, '<span class="text-brand-accent font-bold">$1</span>')
                            .replace(/\`(.*?)\`/g, '<code class="bg-indigo-50/50 text-indigo-600 px-1.5 py-0.5 rounded text-sm font-mono border border-indigo-100/30">$1</code>');
                        
                        questionLines.push(formattedLine);
                        continue; // Question me add ho gaya, next line pe jao
                    }
                }

                // --- NORMAL TEXT PROCESSING ---
                if (!line) { 
                    html += '<div class="h-2"></div>'; 
                    continue; 
                }

                // Render Extracted Code Block
                if (line.includes('__CODE_BLOCK_')) {
                    const blockMatch = line.match(/__CODE_BLOCK_(\d+)__/);
                    if (blockMatch && blockMatch[1]) {
                        const blockIndex = parseInt(blockMatch[1], 10);
                        if (codeBlocks[blockIndex]) {
                            html += formatCodeUI(codeBlocks[blockIndex].code, codeBlocks[blockIndex].lang, i);
                        }
                    }
                    continue;
                }

                let fLine = line
                    .replace(/\*\*(.*?)\*\*/g, '<span class="text-brand-accent font-bold">$1</span>')
                    .replace(/\`(.*?)\`/g, '<code class="bg-indigo-50/50 text-indigo-600 px-1.5 py-0.5 rounded text-sm font-mono border border-indigo-100/30">$1</code>');

                // Soft Dialogues
                const dialogueMatch = line.match(/^(Interviewer|Candidate|HR|You|Me):\s*(.*)/i);
                if (dialogueMatch) {
                    const speaker = dialogueMatch[1];
                    const msg = dialogueMatch[2].replace(/\*\*(.*?)\*\*/g, '<span class="text-slate-800 font-bold">$1</span>').replace(/\`(.*?)\`/g, '<code class="bg-indigo-50/50 text-indigo-600 px-1.5 py-0.5 rounded text-sm font-mono border border-indigo-100/30">$1</code>');
                    const isUser = ['candidate', 'me', 'you'].includes(speaker.toLowerCase());
                    const align = isUser ? 'justify-end' : 'justify-start';
                    const bubble = isUser ? 'bg-indigo-50/70 text-indigo-900 border border-indigo-100 shadow-sm' : 'bg-white border border-slate-100 text-slate-600 shadow-sm';
                    const badge = isUser ? 'hidden' : 'bg-slate-50 text-slate-400 border border-slate-200';

                    html += `
                        <div class="flex ${align} w-full my-2.5 animate-slide-up" style="animation-delay: ${i * 10}ms">
                            <div class="flex gap-4 max-w-[90%] ${isUser ? 'flex-row-reverse' : 'flex-row'}">
                                ${!isUser ? `<div class="w-10 h-10 rounded-2xl ${badge} flex items-center justify-center text-[10px] font-bold shrink-0">${speaker[0].toUpperCase()}</div>` : ''}
                                <div class="flex flex-col ${isUser ? 'items-end' : 'items-start'}">
                                    <span class="text-[9px] font-bold tracking-[0.2em] text-slate-400 uppercase mb-1 px-3">${speaker}</span>
                                    <div class="px-7 py-4 rounded-[26px] ${bubble} text-[17px] font-medium leading-relaxed ${isUser ? 'rounded-tr-none' : 'rounded-tl-none'}">
                                        ${msg}
                                    </div>
                                </div>
                            </div>
                        </div>
                    `;
                    continue;
                }

                // Subheadings
                const subHeadMatch = line.match(/^##\s+(.*)/);
                if (subHeadMatch) {
                    html += `<h2 class="text-lg font-bold text-slate-700 mt-6 mb-3 animate-slide-up flex items-center gap-2 uppercase tracking-tighter"><span class="w-1 h-5 bg-brand-primary/50 rounded-full"></span>${subHeadMatch[1].replace(/\*\*(.*?)\*\*/g, '<span class="text-brand-accent">$1</span>')}</h2>`;
                    continue;
                }

                // Blockquotes
                const quoteMatch = line.match(/^>\s+(.*)/);
                if (quoteMatch) {
                    html += `
                        <blockquote class="border-l-4 border-slate-200 bg-slate-50 py-4 px-6 my-4 rounded-r-2xl italic text-slate-500 animate-slide-up">
                            "${quoteMatch[1]}"
                        </blockquote>
                    `;
                    continue;
                }

                // Soft MCQ Options
                const listMatch = line.match(isOptionRegex);
                if (listMatch) {
                    const bullet = listMatch[1].replace(/[-*]/, '○'); 
                    const content = listMatch[2].replace(/\*\*(.*?)\*\*/g, '<span class="text-slate-800 font-bold">$1</span>').replace(/\`(.*?)\`/g, '<code class="bg-indigo-50/50 text-indigo-600 px-1.5 py-0.5 rounded text-sm font-mono border border-indigo-100/30">$1</code>');
                    
                    html += `
                        <div class="flex items-start gap-5 p-4 rounded-[22px] bg-white border border-slate-100 hover:border-brand-primary/30 hover:bg-slate-50 transition-all cursor-pointer animate-slide-up group shadow-sm" style="animation-delay: ${i * 10}ms">
                            <div class="flex-shrink-0 w-11 h-11 rounded-2xl bg-slate-50 text-slate-400 font-bold flex items-center justify-center group-hover:bg-brand-primary group-hover:text-white transition-all text-xs border border-slate-200">
                                ${bullet.replace(/[\).]/, '')}
                            </div>
                            <span class="text-[18px] font-bold text-slate-600 group-hover:text-slate-800 pt-2.5 leading-[1.3] tracking-tight">${content}</span>
                        </div>
                    `;
                    continue;
                } 

                // Standard Paragraph
                html += `<p class="text-slate-600 text-[16px] leading-relaxed mb-1.5 animate-slide-up" style="animation-delay: ${i * 10}ms">${fLine}</p>`;
            }

            // EDGE CASE: If completely question only
            if (isExtractingQuestion && questionLines.length > 0) {
                let combinedQ = questionLines.join('<br>');
                html += `<h1 class="text-3xl md:text-4xl font-bold text-slate-700 leading-snug mb-8 pb-5 border-b border-slate-100 animate-slide-up tracking-tight question-glow">${combinedQ}</h1>`;
            }

            renderArea.innerHTML = html;
        }

        // ==========================================
        // PRO CODE BLOCK RENDERER
        // ==========================================
        function formatCodeUI(code, lang, index) {
            const safeEscape = (str) => str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#039;');
            let escapedCode = safeEscape(code);

            let highlighted = escapedCode
                .replace(/\b(const|let|var|function|return|if|else|for|while|class|import|from|export|default|switch|case|break|public|private|protected|void|int|string|boolean|new|this)\b/g, '<span class="code-keyword">$1</span>')
                .replace(/\b([A-Z][a-zA-Z0-9_]*)\b/g, '<span class="code-class">$1</span>')
                .replace(/\b([a-zA-Z_]\w*)\s*(?=\()/g, '<span class="code-function">$1</span>')
                .replace(/\b(\d+)\b/g, '<span class="code-number">$1</span>')
                .replace(/(&quot;.*?&quot;|&#039;.*?&#039;|`.*?`)/g, '<span class="code-string">$1</span>')
                .replace(/(\/\/.*|\/\*[\s\S]*?\*\/)/g, '<span class="code-comment">$1</span>');

            const langDisplay = lang ? lang.toUpperCase() : 'CODE';
            
            const lines = highlighted.split('\n');
            const numberedLines = lines.map((line, i) => {
                return `
                    <div class="table-row hover:bg-white/5">
                        <span class="table-cell text-right pr-4 text-gray-600 select-none text-xs border-r border-white/10 align-middle w-8">${i + 1}</span>
                        <span class="table-cell pl-4 align-middle whitespace-pre">${line || ' '}</span>
                    </div>`;
            }).join('');

            const rawBase64 = btoa(unescape(encodeURIComponent(code)));

            return `
                <div class="my-4 rounded-3xl overflow-hidden bg-white/40 animate-slide-up shadow-sm" style="animation-delay: ${index * 10}ms">
                    <div class="p-3 md:p-4 overflow-x-auto text-[19px] leading-relaxed font-mono text-slate-600">
                        <div class="table border-collapse w-full">
                            ${numberedLines}
                        </div>
                    </div>
                </div>
            `;
        }

        // ==========================================
        // COPY UTILITY
        // ==========================================
        window.copyToClipboard = function(btn, b64Code) {
            try {
                const actualCode = decodeURIComponent(escape(atob(b64Code)));
                
                if (navigator.clipboard && window.isSecureContext) {
                    navigator.clipboard.writeText(actualCode).then(() => showSuccess(btn));
                } else {
                    let ta = document.createElement("textarea");
                    ta.value = actualCode;
                    document.body.appendChild(ta);
                    ta.select();
                    document.execCommand('copy');
                    document.body.removeChild(ta);
                    showSuccess(btn);
                }
            } catch(e) { console.error("Copy failed", e); }
        };

        function showSuccess(btn) {
            const originalHTML = btn.innerHTML;
            btn.innerHTML = `<svg class="h-3 w-3 text-brand-success" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7" /></svg> <span class="text-brand-success">Copied</span>`;
            setTimeout(() => { btn.innerHTML = originalHTML; }, 2000);
        }

        // ==========================================
        // WINNER ANIMATION (Flawless Trigger)
        // ==========================================
        function triggerWinner(rank, name = "") {
            const overlay = document.getElementById('winnerOverlay');
            const badge = document.getElementById('winnerBadge');
            const rankLabel = document.getElementById('winnerRank');
            const divider = document.getElementById('winnerDivider');
            const subtextLabel = document.getElementById('winnerSubtext');
            
            // Reset states
            badge.className = "inline-block px-5 py-1.5 rounded-full bg-slate-100 text-[10px] font-bold tracking-[0.4em] text-slate-400 uppercase border border-slate-200/50 opacity-0 transform translate-y-4";
            rankLabel.className = "text-8xl md:text-9xl font-bold mb-4 tracking-tighter opacity-0 scale-50 transition-all duration-500";
            divider.style.width = "0";
            subtextLabel.className = "text-4xl md:text-6xl font-black uppercase tracking-[0.2em] text-glow-fx opacity-0 translate-y-12 transition-all duration-700";

            let rankTxt = "1ST", color = "#6366f1", bg = "rgba(99, 102, 241, 0.08)"; 
            if (rank === 2) { rankTxt = "2ND"; color = "#0ea5e9"; bg = "rgba(14, 165, 233, 0.08)"; } 
            if (rank === 3) { rankTxt = "3RD"; color = "#10b981"; bg = "rgba(16, 185, 129, 0.08)"; } 

            if (name) {
                rankLabel.innerText = name.toUpperCase();
                subtextLabel.innerText = rankTxt + " WINNER";
            } else {
                rankLabel.innerText = rankTxt;
                subtextLabel.innerText = "WINNER";
            }

            rankLabel.style.color = color;
            subtextLabel.style.setProperty('--glow-color', color + '22');
            overlay.style.background = `radial-gradient(circle at center, rgba(255, 255, 255, 0.98) 0%, ${bg} 100%)`;
            
            overlay.classList.remove('hidden');

            // Staggered Reveal Sequence
            setTimeout(() => { badge.classList.add('animate-reveal-up'); }, 100);
            setTimeout(() => { 
                rankLabel.classList.remove('opacity-0', 'scale-50');
                rankLabel.classList.add('animate-bounce-in');
                createBurst(color); // Explosion!
            }, 600);
            setTimeout(() => { divider.style.width = "120px"; }, 1100);
            setTimeout(() => { subtextLabel.classList.add('animate-reveal-up'); }, 1400);

            // Auto-close after 5.5 seconds
            setTimeout(closeWinner, 5500);
        }

        function closeWinner() {
            const overlay = document.getElementById('winnerOverlay');
            overlay.style.opacity = "0";
            setTimeout(() => {
                overlay.classList.add('hidden');
                overlay.style.opacity = "1";
                document.getElementById('confettiContainer').innerHTML = '';
            }, 700);
            inputArea.focus();
        }

        function createBurst(color) {
            const container = document.getElementById('confettiContainer');
            const count = 150;
            const angleStep = (Math.PI * 2) / count;

            for (let i = 0; i < count; i++) {
                const p = document.createElement('div');
                p.className = 'particle';
                p.style.left = '50vw';
                p.style.top = '50vh';
                
                const velocity = Math.random() * 15 + 10;
                const angle = Math.random() * Math.PI * 2;
                const vx = Math.cos(angle) * velocity;
                const vy = Math.sin(angle) * velocity;
                
                p.style.background = Math.random() > 0.5 ? color : (Math.random() > 0.5 ? '#38bdf8' : '#e2e8f0');
                p.style.boxShadow = `0 0 10px ${color}44`;

                container.appendChild(p);

                let posX = 50, posY = 50;
                let curVx = vx, curVy = vy;
                let gravity = 0.4;
                
                function update() {
                    posX += curVx * 0.2;
                    posY += curVy * 0.2;
                    curVy += gravity;
                    
                    p.style.left = posX + 'vw';
                    p.style.top = posY + 'vh';
                    p.style.opacity = Math.max(0, p.style.opacity - 0.01);
                    
                    if (posY < 110) requestAnimationFrame(update);
                }
                requestAnimationFrame(update);
            }
        }
    </script>
