<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Real Interview Experience</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        mono: ['JetBrains Mono', 'monospace'],
                    },
                    colors: {
                        studio: {
                            bg: '#000000',
                            panel: '#0a0a0a',
                            card: '#111111',
                            border: '#1f1f1f'
                        },
                        brand: {
                            primary: '#3b82f6',
                            accent: '#8b5cf6',
                            success: '#10b981'
                        }
                    },
                    animation: {
                        'fade-in': 'fadeIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards',
                        'slide-up': 'slideUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards',
                        'glow-pulse': 'glowPulse 3s infinite alternate',
                    },
                    keyframes: {
                        fadeIn: {
                            '0%': { opacity: '0' },
                            '100%': { opacity: '1' },
                        },
                        slideUp: {
                            '0%': { opacity: '0', transform: 'translateY(15px)' },
                            '100%': { opacity: '1', transform: 'translateY(0)' },
                        },
                        glowPulse: {
                            '0%': { opacity: '0.3', transform: 'scale(1)' },
                            '100%': { opacity: '0.6', transform: 'scale(1.05)' },
                        }
                    }
                }
            }
        }
    </script>

    <style>
        /* Premium Scrollbar */
        ::-webkit-scrollbar { width: 4px; height: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #555; }

        /* Code Highlighting Core Classes */
        .code-keyword { color: #ff7b72; font-weight: 500; }
        .code-function { color: #d2a8ff; font-weight: 500; }
        .code-string { color: #a5d6ff; }
        .code-number { color: #79c0ff; }
        .code-comment { color: #8b949e; font-style: italic; }
        .code-operator { color: #c9d1d9; }
        .code-class { color: #f0883e; }

        /* Smooth Glass UI */
        .glass-box {
            background: rgba(10, 10, 10, 0.7);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 20px 40px -20px rgba(0,0,0,0.8);
        }

        /* Question Typography Glow */
        .question-glow {
            text-shadow: 0 4px 24px rgba(255, 255, 255, 0.15);
        }

        /* Winner Overlay Effects */
        .winner-backdrop {
            background: radial-gradient(circle at center, #1e1b4b 0%, #000000 100%);
        }
        .text-glow-fx {
            text-shadow: 0 0 20px var(--glow-color), 0 0 40px var(--glow-color), 0 0 80px var(--glow-color);
        }
        .particle {
            position: absolute; width: 6px; height: 12px; background: #fff;
            animation: fall linear forwards; border-radius: 3px;
        }
        @keyframes fall { to { transform: translateY(100vh) rotate(720deg); } }
    </style>
</head>
<body class="bg-studio-bg text-gray-300 min-h-screen selection:bg-brand-primary/40 selection:text-white font-sans overflow-hidden">

    <!-- Cinematic Background Lights -->
    <div class="fixed inset-0 z-0 pointer-events-none">
        <div class="absolute top-[-20%] left-[20%] w-[40vw] h-[40vw] rounded-full bg-brand-primary/10 blur-[100px] animate-glow-pulse"></div>
        <div class="absolute bottom-[-20%] right-[10%] w-[30vw] h-[30vw] rounded-full bg-brand-accent/10 blur-[100px] animate-glow-pulse" style="animation-delay: -1.5s;"></div>
    </div>

    <!-- Main App Container -->
    <div class="relative z-10 flex flex-col h-screen max-w-6xl mx-auto px-4 py-4 gap-4">
        
        <!-- Header area -->
        <header class="flex items-center justify-between flex-none py-2 border-b border-white/5 pb-4">
            <div class="flex items-center gap-4">
                <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-gray-800 to-black border border-gray-700 flex items-center justify-center shadow-lg">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 10l4.553-2.276A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z" />
                    </svg>
                </div>
                <div>
                    <h1 class="text-xl md:text-2xl font-bold tracking-tight text-white flex items-center gap-2">
                        Real Interview <span class="text-brand-primary font-light">Experience</span>
                    </h1>
                    <div class="flex items-center gap-2 text-xs text-gray-500 mt-1">
                        <span class="flex h-2 w-2 relative">
                            <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-red-400 opacity-75"></span>
                            <span class="relative inline-flex rounded-full h-2 w-2 bg-red-500"></span>
                        </span>
                        Live Quetions
                    </div>
                </div>
            </div>

            <!-- Action Buttons -->
            <div class="flex items-center gap-3">
                <div class="hidden sm:flex items-center bg-white/5 rounded-lg p-1 border border-white/5 gap-1">
                    <button onclick="triggerWinner(1)" class="px-3 py-1.5 rounded-md text-xs font-bold text-gray-400 hover:text-white hover:bg-white/10 transition-colors">1ST</button>
                    <button onclick="triggerWinner(2)" class="px-3 py-1.5 rounded-md text-xs font-bold text-gray-400 hover:text-white hover:bg-white/10 transition-colors">2ND</button>
                    <button onclick="triggerWinner(3)" class="px-3 py-1.5 rounded-md text-xs font-bold text-gray-400 hover:text-white hover:bg-white/10 transition-colors">3RD</button>
                </div>
                
                <button onclick="resetCanvas()" class="text-xs font-medium text-red-400 hover:text-red-300 hover:bg-red-400/10 bg-white/5 px-4 py-2 rounded-lg border border-white/5 transition-all flex items-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
                    </svg>
                    Clear Data
                </button>
            </div>
        </header>

        <!-- Smart Input Bar -->
        <div class="flex-none z-20">
            <div class="glass-box rounded-xl p-1 focus-within:ring-1 focus-within:ring-brand-primary/50 transition-all">
                <div class="bg-black rounded-lg px-4 flex items-center gap-3 h-14 border border-white/5">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-brand-primary" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z" />
                    </svg>
                    <input 
                        type="text"
                        id="inputArea" 
                        autocomplete="off"
                        class="w-full bg-transparent border-none outline-none text-white placeholder-gray-600 font-medium text-sm h-full"
                        placeholder=""
                    />
                    <div id="statusDot" class="w-2.5 h-2.5 rounded-full bg-gray-600 shadow-inner transition-colors duration-300"></div>
                </div>
            </div>
        </div>

        <!-- Render Viewport -->
        <div class="flex-1 min-h-0 relative rounded-2xl overflow-hidden glass-box border border-white/10 flex flex-col">
            <!-- Window Controls -->
            <div class="h-8 bg-black/40 border-b border-white/5 flex items-center px-4 gap-2 flex-none">
                <div class="w-2.5 h-2.5 rounded-full bg-red-500/80"></div>
                <div class="w-2.5 h-2.5 rounded-full bg-yellow-500/80"></div>
                <div class="w-2.5 h-2.5 rounded-full bg-green-500/80"></div>
                <span class="ml-2 text-[10px] font-mono text-gray-500 tracking-wider"></span>
            </div>

            <!-- Content Area -->
            <div id="renderArea" class="flex-1 overflow-y-auto p-6 flex flex-col gap-4 scroll-smooth">
                <!-- Placeholder State -->
                <div class="flex-1 flex flex-col items-center justify-center text-gray-600 gap-4">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-12 w-12 opacity-50" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
                    </svg>
                    <p class="font-medium text-sm">Real Interview Experience</p>
                </div>
            </div>
        </div>
    </div>

    <!-- Winner Celebration Overlay -->
    <div id="winnerOverlay" class="fixed inset-0 z-50 hidden flex flex-col items-center justify-center winner-backdrop text-white overflow-hidden backdrop-blur-xl">
        <div id="confettiContainer" class="absolute inset-0 pointer-events-none"></div>
        <div class="relative z-10 text-center opacity-0 scale-90 transition-all duration-500 ease-out" id="winnerTextContainer">
            <span class="inline-block px-4 py-1 rounded-full bg-white/10 text-[10px] font-bold tracking-[0.3em] text-gray-300 mb-6 uppercase border border-white/10">Result Announcement</span>
            <h2 id="winnerRank" class="text-8xl md:text-9xl font-black mb-2 tracking-tighter text-white">1ST</h2>
            <div class="h-1 w-24 mx-auto bg-white/20 rounded-full mb-6"></div>
            <h3 id="winnerSubtext" class="text-4xl md:text-5xl font-extrabold uppercase tracking-[0.2em] text-glow-fx" style="--glow-color: #3b82f6;">Winner</h3>
        </div>
        <button onclick="closeWinner()" class="absolute bottom-10 text-gray-400 hover:text-white text-xs font-bold uppercase tracking-widest border border-white/20 px-8 py-3 rounded-full bg-black/50 hover:bg-white/10 transition-all duration-300">
            Close Overlay
        </button>
    </div>

    <script>
        const inputArea = document.getElementById('inputArea');
        const renderArea = document.getElementById('renderArea');
        const statusDot = document.getElementById('statusDot');
        let pastedContent = ""; 

        // Focus management
        inputArea.focus();
        document.addEventListener('click', () => { if(document.activeElement !== inputArea) inputArea.focus(); });

        // Event: FLAWLESS PASTE
        inputArea.addEventListener('paste', (e) => {
            e.preventDefault();
            const text = (e.clipboardData || window.clipboardData).getData('text');
            if (text.trim()) {
                pastedContent = text;
                renderContent(text);
                inputArea.value = '';
                inputArea.placeholder = "";
                statusDot.className = "w-2.5 h-2.5 rounded-full bg-brand-success shadow-[0_0_10px_#10b981]";
                setTimeout(() => statusDot.className = "w-2.5 h-2.5 rounded-full bg-gray-600", 2000);
            }
        });

        // Event: SMART TYPING (For Winner Shortcuts)
        inputArea.addEventListener('input', (e) => {
            const val = e.target.value.trim();
            if (val.startsWith('#')) {
                statusDot.className = "w-2.5 h-2.5 rounded-full bg-brand-primary shadow-[0_0_10px_#3b82f6]";
            } else {
                statusDot.className = "w-2.5 h-2.5 rounded-full bg-gray-600";
            }
        });

        // Event: TRIGGER SHORTCUTS ON ENTER
        inputArea.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                const val = inputArea.value.trim();
                
                if (val.startsWith('#')) {
                    e.preventDefault();
                    let rank = 1, name = '';
                    
                    if (val.startsWith('###')) { rank = 3; name = val.substring(3).trim(); }
                    else if (val.startsWith('##')) { rank = 2; name = val.substring(2).trim(); }
                    else if (val.startsWith('#')) { rank = 1; name = val.substring(1).trim(); }
                    
                    triggerWinner(rank, name);
                    inputArea.value = ''; 
                    statusDot.className = "w-2.5 h-2.5 rounded-full bg-gray-600";
                }
                else if (val.length > 0) {
                    renderContent(val);
                    inputArea.value = '';
                }
            }
        });

        // Reset the screen
        function resetCanvas() {
            pastedContent = "";
            renderArea.innerHTML = `
                <div class="flex-1 flex flex-col items-center justify-center text-gray-600 gap-4 animate-fade-in">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-12 w-12 opacity-50" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
                    </svg>
                    <p class="font-medium text-sm">Screen Cleared. Paste new content.</p>
                </div>`;
            inputArea.value = '';
            inputArea.placeholder = "";
            inputArea.focus();
        }

        // ==========================================
        // SMART PARSER: Core Logic Engine
        // ==========================================
        function renderContent(text) {
            if (!text.trim()) return;

            // 1. RAW CODE DETECTION
            const isCodeLikely = (str) => {
                if (str.includes('```')) return false; 
                const lines = str.split('\n');
                let codeHints = 0, textHints = 0;

                const codePatterns = [
                    /function\s*\w*\s*\(/, /const\s+\w+\s*=/, /let\s+\w+\s*=/, /var\s+\w+\s*=/,
                    /import\s+.*from/, /import\s+\w+/, /export\s+default/, /class\s+\w+/, /public\s+class/,
                    /def\s+\w+\s*\(/, /if\s*\(/, /for\s*\(/, /while\s*\(/, /return\s+/,
                    /console\./, /System\.out/, /print\s*\(/, /#include/, /<[a-zA-Z]+>/i,
                    /=>/, /===/, /!==/, /==/, /\+=/, /\-=/, 
                    /^\s*SELECT\b/i, /^\s*FROM\b/i, /^\s*WHERE\b/i, /^\s*UPDATE\b/i, /^\s*INSERT\b/i, /^\s*DELETE\b/i,
                    /for\s+\w+\s+in\s+/, /if\s+.+:/, /elif\s+.+:/, /else:/
                ];

                lines.forEach(l => {
                    let line = l.trim();
                    if(!line) return;
                    if (codePatterns.some(regex => regex.test(line)) || line.endsWith(';') || line.endsWith('{') || line === '}' || /^[\s]*[\]\}][\s,;]*$/.test(line) || line.includes(' = ') || /^[\w\.]+\s*\(.*\)/.test(line)) {
                        codeHints++;
                    } else if (/^[A-Z][a-z]+/.test(line) && /[.?!]$/.test(line)) {
                        textHints++;
                    }
                });
                return codeHints > 0 && codeHints >= textHints;
            };

            if (isCodeLikely(text)) {
                text = "```\n" + text + "\n```";
            }

            let html = '';
            
            // 2. EXTRACT CODE BLOCKS
            const codeBlocks = [];
            let processedText = text.replace(/```(\w*)\n([\s\S]*?)```/g, (match, lang, code) => {
                codeBlocks.push({ lang: lang.trim(), code: code.trim() });
                return `\n__CODE_BLOCK_${codeBlocks.length - 1}__\n`;
            });
            processedText = processedText.replace(/```([\s\S]*?)```/g, (match, code) => {
                codeBlocks.push({ lang: '', code: code.trim() });
                return `\n__CODE_BLOCK_${codeBlocks.length - 1}__\n`;
            });

            // 3. PARSE MULTILINE QUESTION (H1/H2)
            const lines = processedText.split('\n');
            let isExtractingQuestion = true;
            let questionLines = [];

            const isLooksLikeCode = (str) => {
                return /^[a-z_][a-zA-Z0-9_]*\s*=/.test(str) || /[{}\[\]]/.test(str) || /^(const|let|var|function|def|class|import|#include)/.test(str) || /==|!=|=>|\+=|\-=/.test(str) || /console\.|System\.|print\(/.test(str) || /;\s*$/.test(str) || /^\s*(SELECT|UPDATE|INSERT|DELETE|FROM|WHERE)\b/i.test(str); 
            };

            // Options Regex: Jaise A), 1., (A)
            const isOptionRegex = /^(\(?[a-zA-Z][\).]|[0-9]+[\).]|[-*])\s+(.*)/;

            for (let i = 0; i < lines.length; i++) {
                let line = lines[i].trim();

                // MULTILINE QUESTION LOGIC
                if (isExtractingQuestion) {
                    // Agar sabse upar khali jagah ho toh usko ignore karo
                    if (!line && questionLines.length === 0) continue;

                    // Agar question text chalu hone ke baad khali jagah aaye -> Question End
                    if (!line) {
                        isExtractingQuestion = false;
                        let combinedQ = questionLines.join('<br>');
                        html += `<h1 class="text-2xl md:text-3xl lg:text-4xl font-extrabold text-white leading-snug  border-b border-white/10 animate-slide-up tracking-tight question-glow">${combinedQ}</h1>`;
                        continue;
                    }

                    let isFirstContentLine = questionLines.length === 0;

                    // Conditions jo Question Extraction ko rokengi
                    if (line.includes('__CODE_BLOCK_') || 
                        isLooksLikeCode(line) || 
                        (!isFirstContentLine && isOptionRegex.test(line)) || // Pehli line 1. ho sakti hai, par agli line pe option mile toh H1 ban jaye
                        line.match(/^(Interviewer|Candidate|HR|You|Me):/i) || 
                        line.match(/^##/) || 
                        line.match(/^>/)) 
                    {
                        isExtractingQuestion = false;
                        
                        if (questionLines.length > 0) {
                            let combinedQ = questionLines.join('<br>');
                            html += `<h1 class="text-2xl md:text-3xl lg:text-4xl font-extrabold text-white leading-snug mb-8 pb-5 border-b border-white/10 animate-slide-up tracking-tight question-glow">${combinedQ}</h1>`;
                        }
                        // Continue mat likhna, taaki ye line normal process ho jaye!
                    } else {
                        // Formatting
                        let formattedLine = line
                            .replace(/\*\*(.*?)\*\*/g, '<span class="text-brand-primary font-bold">$1</span>')
                            .replace(/\`(.*?)\`/g, '<code class="bg-white/10 text-brand-primary px-1.5 py-0.5 rounded text-sm font-mono border border-white/5">$1</code>');
                        
                        questionLines.push(formattedLine);
                        continue; // Question me add ho gaya, next line pe jao
                    }
                }

                // --- NORMAL TEXT PROCESSING ---
                if (!line) { 
                    html += '<div class="h-2"></div>'; 
                    continue; 
                }

                // Render Extracted Code Block
                if (line.includes('__CODE_BLOCK_')) {
                    const blockMatch = line.match(/__CODE_BLOCK_(\d+)__/);
                    if (blockMatch && blockMatch[1]) {
                        const blockIndex = parseInt(blockMatch[1], 10);
                        if (codeBlocks[blockIndex]) {
                            html += formatCodeUI(codeBlocks[blockIndex].code, codeBlocks[blockIndex].lang, i);
                        }
                    }
                    continue;
                }

                let fLine = line
                    .replace(/\*\*(.*?)\*\*/g, '<span class="text-brand-primary font-bold">$1</span>')
                    .replace(/\`(.*?)\`/g, '<code class="bg-white/10 text-brand-primary px-1.5 py-0.5 rounded text-sm font-mono border border-white/5">$1</code>');

                // Dialogues
                const dialogueMatch = line.match(/^(Interviewer|Candidate|HR|You|Me):\s*(.*)/i);
                if (dialogueMatch) {
                    const speaker = dialogueMatch[1];
                    const msg = dialogueMatch[2].replace(/\*\*(.*?)\*\*/g, '<span class="text-white font-bold">$1</span>').replace(/\`(.*?)\`/g, '<code class="bg-white/10 text-brand-primary px-1.5 py-0.5 rounded text-sm font-mono">$1</code>');
                    const isUser = ['candidate', 'me', 'you'].includes(speaker.toLowerCase());
                    const align = isUser ? 'justify-end' : 'justify-start';
                    const bubble = isUser ? 'bg-brand-primary/20 border-brand-primary/30 text-white' : 'bg-white/5 border-white/10 text-gray-300';
                    const badge = isUser ? 'bg-brand-primary text-white' : 'bg-gray-700 text-white';

                    html += `
                        <div class="flex ${align} w-full my-2 animate-slide-up" style="animation-delay: ${i * 10}ms">
                            <div class="flex gap-3 max-w-[85%] ${isUser ? 'flex-row-reverse' : 'flex-row'}">
                                <div class="w-7 h-7 rounded-full ${badge} flex items-center justify-center text-xs font-bold shrink-0">${speaker[0].toUpperCase()}</div>
                                <div class="flex flex-col ${isUser ? 'items-end' : 'items-start'}">
                                    <span class="text-[10px] font-bold tracking-wider text-gray-500 uppercase mb-1 px-1">${speaker}</span>
                                    <div class="px-4 py-2.5 rounded-2xl ${bubble} border shadow-lg text-[15px] leading-relaxed">
                                        ${msg}
                                    </div>
                                </div>
                            </div>
                        </div>
                    `;
                    continue;
                }

                // Subheadings
                const subHeadMatch = line.match(/^##\s+(.*)/);
                if (subHeadMatch) {
                    html += `<h2 class="text-xl font-bold text-brand-primary mt-6 mb-3 animate-slide-up">${subHeadMatch[1].replace(/\*\*(.*?)\*\*/g, '<span class="text-white">$1</span>')}</h2>`;
                    continue;
                }

                // Blockquotes
                const quoteMatch = line.match(/^>\s+(.*)/);
                if (quoteMatch) {
                    html += `
                        <blockquote class="border-l-4 border-brand-primary bg-brand-primary/10 py-3 px-5 my-4 rounded-r-lg italic text-gray-300 animate-slide-up">
                            "${quoteMatch[1]}"
                        </blockquote>
                    `;
                    continue;
                }

                // MCQ Options
                const listMatch = line.match(isOptionRegex);
                if (listMatch) {
                    const bullet = listMatch[1].replace(/[-*]/, '•'); 
                    const content = listMatch[2].replace(/\*\*(.*?)\*\*/g, '<span class="text-white font-bold">$1</span>').replace(/\`(.*?)\`/g, '<code class="bg-white/10 text-brand-primary px-1.5 py-0.5 rounded text-sm font-mono border border-white/5">$1</code>');
                    
                    html += `
                        <div class="flex items-start gap-3 p-3.5 rounded-xl bg-studio-card border border-white/5 hover:border-brand-primary/50 hover:bg-white/5 transition-all cursor-pointer animate-slide-up shadow-sm group" style="animation-delay: ${i * 10}ms">
                            <div class="flex-shrink-0 w-7 h-7 rounded bg-white/5 text-gray-400 font-bold flex items-center justify-center group-hover:bg-brand-primary group-hover:text-white transition-colors text-sm border border-white/5">
                                ${bullet.replace(/[\).]/, '')}
                            </div>
                            <span class="text-[15px] text-gray-300 group-hover:text-white pt-0.5">${content}</span>
                        </div>
                    `;
                    continue;
                } 

                // Standard Paragraph
                html += `<p class="text-gray-400 text-[15px] leading-relaxed mb-2 animate-slide-up" style="animation-delay: ${i * 10}ms">${fLine}</p>`;
            }

            // EDGE CASE: If completely question only
            if (isExtractingQuestion && questionLines.length > 0) {
                let combinedQ = questionLines.join('<br>');
                html += `<h1 class="text-2xl md:text-3xl lg:text-4xl font-extrabold text-white leading-snug mb-8 pb-5 border-b border-white/10 animate-slide-up tracking-tight question-glow">${combinedQ}</h1>`;
            }

            renderArea.innerHTML = html;
        }

        // ==========================================
        // PRO CODE BLOCK RENDERER
        // ==========================================
        function formatCodeUI(code, lang, index) {
            const safeEscape = (str) => str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#039;');
            let escapedCode = safeEscape(code);

            let highlighted = escapedCode
                .replace(/\b(const|let|var|function|return|if|else|for|while|class|import|from|export|default|switch|case|break|public|private|protected|void|int|string|boolean|new|this)\b/g, '<span class="code-keyword">$1</span>')
                .replace(/\b([A-Z][a-zA-Z0-9_]*)\b/g, '<span class="code-class">$1</span>')
                .replace(/\b([a-zA-Z_]\w*)\s*(?=\()/g, '<span class="code-function">$1</span>')
                .replace(/\b(\d+)\b/g, '<span class="code-number">$1</span>')
                .replace(/(&quot;.*?&quot;|&#039;.*?&#039;|`.*?`)/g, '<span class="code-string">$1</span>')
                .replace(/(\/\/.*|\/\*[\s\S]*?\*\/)/g, '<span class="code-comment">$1</span>');

            const langDisplay = lang ? lang.toUpperCase() : 'CODE';
            
            const lines = highlighted.split('\n');
            const numberedLines = lines.map((line, i) => {
                return `
                    <div class="table-row hover:bg-white/5">
                        <span class="table-cell text-right pr-4 text-gray-600 select-none text-xs border-r border-white/10 align-middle w-8">${i + 1}</span>
                        <span class="table-cell pl-4 align-middle whitespace-pre">${line || ' '}</span>
                    </div>`;
            }).join('');

            const rawBase64 = btoa(unescape(encodeURIComponent(code)));

            return `
                <div class="my-4 rounded-xl overflow-hidden border border-white/10 shadow-2xl animate-slide-up bg-[#0d1117] flex flex-col" style="animation-delay: ${index * 10}ms">
                    <div class="bg-black/80 px-4 py-2.5 flex items-center justify-between border-b border-white/10 flex-none">
                        <div class="flex items-center gap-3">
                            <span class="text-[10px] text-brand-primary font-mono font-bold tracking-widest bg-brand-primary/10 px-2 py-0.5 rounded">${langDisplay}</span>
                        </div>
                        <button onclick="copyToClipboard(this, '${rawBase64}')" class="flex items-center gap-1.5 text-[10px] font-bold uppercase tracking-widest text-gray-400 hover:text-white bg-white/5 hover:bg-white/10 px-3 py-1.5 rounded transition-all border border-white/5">
                            <svg class="h-3 w-3 copy-icon" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z" /></svg>
                            <span class="copy-text">Copy</span>
                        </button>
                    </div>
                    <div class="p-4 overflow-x-auto text-[25px] flex-wrap font-mono text-gray-300 bg-[#0d1117]">
                        <div class="table border-collapse w-full">
                            ${numberedLines}
                        </div>
                    </div>
                </div>
            `;
        }

        // ==========================================
        // COPY UTILITY
        // ==========================================
        window.copyToClipboard = function(btn, b64Code) {
            try {
                const actualCode = decodeURIComponent(escape(atob(b64Code)));
                
                if (navigator.clipboard && window.isSecureContext) {
                    navigator.clipboard.writeText(actualCode).then(() => showSuccess(btn));
                } else {
                    let ta = document.createElement("textarea");
                    ta.value = actualCode;
                    document.body.appendChild(ta);
                    ta.select();
                    document.execCommand('copy');
                    document.body.removeChild(ta);
                    showSuccess(btn);
                }
            } catch(e) { console.error("Copy failed", e); }
        };

        function showSuccess(btn) {
            const originalHTML = btn.innerHTML;
            btn.innerHTML = `<svg class="h-3 w-3 text-brand-success" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7" /></svg> <span class="text-brand-success">Copied</span>`;
            setTimeout(() => { btn.innerHTML = originalHTML; }, 2000);
        }

        // ==========================================
        // WINNER ANIMATION (Flawless Trigger)
        // ==========================================
        function triggerWinner(rank, name = "") {
            const overlay = document.getElementById('winnerOverlay');
            const container = document.getElementById('winnerTextContainer');
            const rankLabel = document.getElementById('winnerRank');
            const subtextLabel = document.getElementById('winnerSubtext');
            
            let rankTxt = "1ST", color = "#3b82f6"; // Blue
            if (rank === 2) { rankTxt = "2ND"; color = "#8b5cf6"; } // Purple
            if (rank === 3) { rankTxt = "3RD"; color = "#10b981"; } // Emerald

            if (name) {
                rankLabel.innerText = name.toUpperCase();
                // Dynamic font size based on name length
                if (name.length > 10) rankLabel.className = "text-5xl md:text-7xl font-black mb-2 tracking-tighter text-white";
                else if (name.length > 6) rankLabel.className = "text-7xl md:text-8xl font-black mb-2 tracking-tighter text-white";
                else rankLabel.className = "text-8xl md:text-9xl font-black mb-2 tracking-tighter text-white";
                
                subtextLabel.innerText = rankTxt + " WINNER";
            } else {
                rankLabel.innerText = rankTxt;
                rankLabel.className = "text-8xl md:text-9xl font-black mb-2 tracking-tighter text-white";
                subtextLabel.innerText = "WINNER";
            }

            container.style.setProperty('--glow-color', color);
            
            overlay.classList.remove('hidden');
            
            requestAnimationFrame(() => {
                container.style.transform = "scale(1)";
                container.style.opacity = "1";
            });

            createParticles(color);
        }

        function closeWinner() {
            const overlay = document.getElementById('winnerOverlay');
            const container = document.getElementById('winnerTextContainer');
            
            container.style.transform = "scale(0.9)";
            container.style.opacity = "0";
            setTimeout(() => {
                overlay.classList.add('hidden');
                document.getElementById('confettiContainer').innerHTML = '';
            }, 400);
            inputArea.focus();
        }

        function createParticles(color) {
            const container = document.getElementById('confettiContainer');
            container.innerHTML = ''; // clear old
            for (let i = 0; i < 60; i++) {
                const p = document.createElement('div');
                p.className = 'particle';
                p.style.left = Math.random() * 100 + 'vw';
                p.style.animationDuration = (Math.random() * 2 + 1.5) + 's';
                p.style.background = Math.random() > 0.5 ? color : '#ffffff';
                p.style.opacity = Math.random() * 0.8 + 0.2;
                container.appendChild(p);
            }
        }
    </script>
</body>
</html>
